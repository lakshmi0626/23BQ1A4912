<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Beautiful Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">DevPortal</div>
        <button class="btn-theme" id="themeToggle">Toggle Dark Mode</button>
    </header>

    <div class="container">
        <h1>Welcome to Your Interactive Dashboard</h1>
        <p>This layout is split cleanly into native HTML structures, custom external CSS styling sheets, and lightweight JavaScript handles.</p>
        <button class="btn-main" id="openModalBtn">Click Me!</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Success! 🎉</h2>
            <p>The JavaScript engine caught your click listener perfectly and made this popup appear smoothly.</p>
            <button class="btn-close" id="closeModalBtn">Close Window</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
